<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#f4f6f9; font-family:Arial, Helvetica, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9; padding:24px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- HEADER -->
          <tr>
            <td style="background-color:#1a3c6e; padding:24px 32px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:20px; font-weight:700; letter-spacing:0.5px;">
                🎓 Sistema Académico — CUL
              </h1>
              <p style="margin:4px 0 0; color:#a8c4e6; font-size:13px;">
                Corporación Universitaria Latinoamericana
              </p>
            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background-color:#f8f9fa; padding:20px 32px; border-top:1px solid #e9ecef; text-align:center;">
              <p style="margin:0; color:#868e96; font-size:12px;">
                Este es un correo automático del Sistema de Gestión de Solicitudes Académicas.
              </p>
              <p style="margin:4px 0 0; color:#adb5bd; font-size:11px;">
                Corporación Universitaria Latinoamericana — Barranquilla, Colombia
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
