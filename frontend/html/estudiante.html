<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiante — Solicitudes Académicas</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/estudiante.css">
    <link rel="stylesheet" href="../css/datatables.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
</head>

<body>

    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <app-navbar title="PANEL ESTUDIANTE"></app-navbar>

    <div class="hero">
        <div class="hero-inner">
            <div class="hero-box">
                <h2>Bienvenido a tu panel estudiantil</h2>
                <p style="margin-top:5px; display:inline-block; font-size:14px; color:rgba(255, 255, 255, 0.7);">
                    Bienvenido(a), <span id="welcome-name" style="font-weight:600; color:#fff;"></span>. Aquí puedes ver
                    y gestionar tus solicitudes.</p>
            </div>
            <button class="btn-nueva" id="btn-nueva-solicitud">+ Nueva Solicitud</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- STAT CARDS -->
        <div class="stat-grid">
            <div class="stat-box c-blue">
                <div class="stat-icon">📄</div>
                <div>
                    <div class="stat-num" id="stat-total">–</div>
                    <div class="stat-lbl">Total</div>
                </div>
            </div>
            <div class="stat-box c-yellow">
                <div class="stat-icon">⏳</div>
                <div>
                    <div class="stat-num" id="stat-pendientes">–</div>
                    <div class="stat-lbl">Pendientes</div>
                </div>
            </div>
            <div class="stat-box c-green">
                <div class="stat-icon">✓</div>
                <div>
                    <div class="stat-num" id="stat-aprobadas">–</div>
                    <div class="stat-lbl">Aprobadas</div>
                </div>
            </div>
            <div class="stat-box c-cyan">
                <div class="stat-icon">🔍</div>
                <div>
                    <div class="stat-num" id="stat-revision">–</div>
                    <div class="stat-lbl">En revisión</div>
                </div>
            </div>
        </div>

        <!-- SOLICITUDES -->
        <div class="panel">
            <div class="panel-head">
                <h3>
                    <div class="panel-head-dot"></div> solicitudes
                </h3>
            </div>

            <div class="filter-bar">
                <button class="filter-chip active" data-filter="todas">Todas</button>
                <button class="filter-chip" data-filter="pendiente">Pendientes</button>
                <button class="filter-chip" data-filter="en_revision">En revisión</button>
                <button class="filter-chip" data-filter="aprobada">Aprobadas</button>
                <button class="filter-chip" data-filter="rechazada">Rechazadas</button>
            </div>

            <div id="lista-solicitudes">
                <div class="empty-state">
                    <div style="font-size:1.5rem;margin-bottom:0.5rem;">⟳</div>
                    Cargando solicitudes...
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL NUEVA SOLICITUD -->
    <div class="modal-overlay" id="modal-nueva">
        <div class="modal-box">
            <div class="modal-head">
                <h4>Nueva Solicitud</h4>
                <button class="modal-close" id="btn-cerrar-nueva-1">✕</button>
            </div>
            <div class="modal-body">

                <div class="user-info"
                    style="background:var(--primary-soft);border:1px solid rgba(29, 78, 216, 0.15);padding:12px;border-radius:10px;margin-bottom:1rem;color:var(--text);display:flex;flex-direction:column;gap:2px;">
                    <strong id="usuario-nombre" style="font-size:0.85rem;"></strong>
                    <small id="usuario-correo"
                        style="color:var(--muted);font-family:var(--font-mono, monospace);font-size:0.75rem;"></small>
                </div>

                <div class="form-row2">
                    <div class="form-field">
                        <label>Tipo de Solicitud</label>
                        <select id="f-tipo">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Prioridad</label>
                        <select id="f-prioridad">
                            <option value="baja">Baja</option>
                            <option value="media" selected>Media</option>
                            <option value="alta">Alta</option>
                            <option value="urgente">Urgente</option>
                        </select>
                    </div>
                </div>

                <div class="form-field">
                    <label>Descripción</label>
                    <textarea id="f-descripcion" rows="4"
                        placeholder="Describe el motivo de tu solicitud..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-sm cancel" id="btn-cerrar-nueva-2">Cancelar</button>
                <button class="btn-sm blue" id="btn-crear-solicitud">→ Enviar Solicitud</button>
            </div>
        </div>
    </div>

    <!-- MODAL DETALLE -->
    <div class="modal-overlay" id="modal-detalle">
        <div class="modal-box" style="width:520px;">
            <div class="modal-head">
                <h4 id="modal-detalle-title">Detalle</h4>
                <button class="modal-close" id="btn-cerrar-detalle-1">✕</button>
            </div>
            <div class="modal-body" style="padding:0;">
                <div class="json-view">
                    <pre id="modal-detalle-content"></pre>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-sm blue" id="btn-copiar-detalle">⎘ Copiar JSON</button>
            </div>
        </div>
    </div>

    <!-- Estado vacío: no hay solicitudes -->
    <template id="tpl-lista-vacia">
        <div class="empty-state">
            <div style="font-size:1.5rem;margin-bottom:0.5rem;">📭</div>
            No hay solicitudes para mostrar.
        </div>
    </template>

    <!-- Estado de error: no se pudo conectar con la API -->
    <template id="tpl-error-conexion">
        <div class="empty-state">
            <div style="font-size:1.5rem;margin-bottom:0.5rem;color:var(--red);">✕</div>
            No se pudo conectar con el servidor.<br>
            <span class="error-url" style="font-size:0.68rem;"></span>
        </div>
    </template>

    <!-- UTILS -->
    <script src="../js/utils/helpers.js"></script>
    <script src="../js/utils/auth.js"></script>
    <script src="../js/utils/ui.js"></script>

    <!-- API -->
    <script src="../js/api.js"></script>

    <!-- COMPONENTS -->
    <script src="../js/components.js"></script>

    <!-- MÓDULO (CAMBIA SEGÚN PÁGINA) -->
    <script src="../js/estudiante.js"></script>
</body>

</html>
